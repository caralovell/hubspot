  <script>
    (function () {
      var target = "https://app-eu1.hubspot.com/reports-dashboard/146835427/view/111245397";

      try {
        if (window.top !== window.self) {
          window.top.location.replace(target);
        } else {
          window.location.replace(target);
        }
      } catch (e) {
        window.location.replace(target);
      }
    })();
  </script>
